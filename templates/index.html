<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História 💖</title>

  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <script src="/static/js/script.js" defer></script>
</head>

<body data-start="{{ .StartDate }}">

  <!-- Partículas -->
  <div id="tsparticles"></div>

  <!-- Música -->
  <audio id="bg-music" loop>
    <source src="/static/music/sera_que_e_amor.mp3" type="audio/mpeg">
  </audio>

  <div class="container">

    <!-- Seção contador -->
    <div class="section hero">
      <h1 class="counter-title">Estamos juntas há</h1>
      <div id="counter"></div>

      <button class="start-btn" onclick="startExperience()">
        💖 Ver nossa história
      </button>
    </div>

    <!-- Seção história -->
    <div class="section">

      <div class="story-slider">

        <button class="nav prev" onclick="prevSlide()">❮</button>

        <div class="slides">

          <!-- Slide com foto -->
          <div class="slide active">
            <img src="/static/pictures/pic1.jpeg">
            <div class="caption">
              <h3>05 Outubro 2025</h3>
              <p>O dia que tudo começou. O dia que eu soube que era você. 💖</p>
            </div>
          </div>

          <!-- Slide sem foto -->
          <div class="slide">
            <div class="no-photo">💌</div>
            <div class="caption">
              <h3>O dia da minha declaração</h3>
              <p>Eu tremia... mas faria mil vezes de novo por você.</p>
            </div>
          </div>

          <!-- Outro exemplo -->
          <div class="slide">
            <div class="no-photo">✨</div>
            <div class="caption">
              <h3>O dia que nos conhecemos</h3>
              <p>Eu não sabia, mas ali começava a melhor parte da minha vida.</p>
            </div>
          </div>

        </div>

        <button class="nav next" onclick="nextSlide()">❯</button>

      </div>
    </div>

  </div>

</body>
</html>
